/* ── DOTS BG (header) ─────────────────────────────────────── */
const DotsBg = () => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    let dots = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      dots = Array.from({ length: 60 }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.4,
        vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.12,
        phase: Math.random()*Math.PI*2,
      }));
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.012;
      const { width: W, height: H } = canvas;
      ctx.clearRect(0,0,W,H);
      // grid
      ctx.strokeStyle = 'rgba(56,189,248,0.04)'; ctx.lineWidth = 0.5;
      for (let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for (let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      // dots
      dots.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        if (d.x<0) d.x=W; if (d.x>W) d.x=0;
        if (d.y<0) d.y=H; if (d.y>H) d.y=0;
        const alpha = 0.3 + 0.25*Math.sin(t*1.2 + d.phase);
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(56,189,248,${alpha})`; ctx.fill();
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize',resize); };
  }, []);
  return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.8 }} />;
};

const FeatureSection = ({ feature, index, accentColor }) => {

    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.12 });

    return () => obs.disconnect();

              fontFamily:'Oxanium', fontSize:11, fontWeight:500,
              letterSpacing:'0.16em', textTransform:'uppercase',

const App = () => {
  useTweaks(/*EDITMODE-BEGIN*/{"accentColor":"#38bdf8"}/*EDITMODE-END*/);
  const [activeIndex, setActiveIndex] = useState(1);
  const iframeRef = useRef(null);

  const goToSlide = (index) => {
    setActiveIndex(index);
    if (iframeRef.current) {
      iframeRef.current.contentWindow.postMessage({ type: 'goTo', index }, '*');
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <Navbar />
      <div style={{ height:68, flexShrink:0 }} />
      <iframe
        ref={iframeRef}
        src="https://showcase.medgryd.com"
        style={{ flex:1, width:'100%', border:'none', display:'block', minHeight:0 }}
        title="MedGryd Showcase"
        allow="fullscreen"
      />
      <FeatureNav activeIndex={activeIndex} onSelect={goToSlide} />
    </div>
  );
};
