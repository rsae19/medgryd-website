const { useState, useEffect, useRef } = React;
const useWindowWidth = () => {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h, { passive: true });
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
};


/* ── STARS BG ───────────────────────────────────────────── */
const StarsBg = () => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    let stars = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2,
        speed: Math.random() * 2 + 0.5,
        offset: Math.random() * Math.PI * 2,
        accent: Math.random() < 0.14,
      }));
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(56,189,248,0.035)'; ctx.lineWidth = 0.5;
      for (let x = 0; x < canvas.width; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y = 0; y < canvas.height; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      stars.forEach(s => {
        const tw = 0.4 + 0.6 * Math.sin(t * s.speed + s.offset);
        if (s.accent) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(56,189,248,${tw * 0.85})`;
          ctx.shadowColor = 'rgba(56,189,248,0.6)'; ctx.shadowBlur = 5;
          ctx.fill(); ctx.shadowBlur = 0;
        } else {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.85, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,220,255,${tw * 0.5})`;
          ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />;
};

            </a>
            <a href="https://app.medgryd.com" target="_blank" rel="noopener noreferrer" style={{

/* ── STORY SECTION ───────────────────────────────────────── */
const StorySection = () => {
  const beats = [
  {
    num: '01',
    label: 'The Problem',
    text: 'As a first-year osteopathic medical student at Noorda College of Osteopathic Medicine, Raayed Saeed found himself drowning in disconnected tools — a calendar here, flashcards there, a spreadsheet for grades, another for research deadlines. Nothing talked to each other. Nothing was built for how medical students actually work.'
  },
  {
    num: '02',
    label: 'The Decision',
    text: 'So he built something that was.',
    large: true
  },
  {
    num: '03',
    label: 'The Build',
    text: 'What started as a simple weekly planner evolved into a full study operating system — one platform that handles everything from daily task management and clinical skills tracking to research project coordination and exam preparation.'
  },
  {
    num: '04',
    label: 'The Standard',
    text: 'Every feature was born from a real pain point, tested in the fire of actual coursework. MedGryd isn\'t designed in a vacuum — it\'s designed in the library at 11pm before a shelf exam.'
  }];


  return (
    <section style={{ background: '#0a0a0f', padding: '0 clamp(20px,5vw,80px) clamp(72px,9vw,104px)' }}>
      <div style={{ maxWidth: 800, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 0 }}>
        {beats.map((b, i) => {
          const [visible, setVisible] = useState(false);
          const ref = useRef(null);
          useEffect(() => {
            const el = ref.current;if (!el) return;
            const obs = new IntersectionObserver(([e]) => {if (e.isIntersecting) {setVisible(true);obs.disconnect();}}, { threshold: 0.2 });
            obs.observe(el);return () => obs.disconnect();
          }, []);
          return (
            <div key={b.num} ref={ref} style={{
              display: 'grid', gridTemplateColumns: '64px 1fr',
              gap: '0 32px',
              opacity: visible ? 1 : 0,
              transform: visible ? 'none' : 'translateY(18px)',
              transition: `opacity 0.55s ease ${i * 0.1}s, transform 0.55s ease ${i * 0.1}s`
            }}>
              {/* Timeline spine */}
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: 'rgba(56,189,248,0.08)', border: '1.5px solid rgba(56,189,248,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, zIndex: 1 }}>
                  <span style={{ fontFamily: 'Oxanium', fontSize: 11, fontWeight: 600, color: 'rgba(56,189,248,0.7)', letterSpacing: '0.04em' }}>{b.num}</span>
                </div>
                {i < beats.length - 1 &&
                <div style={{ flex: 1, width: 1, background: 'linear-gradient(to bottom, rgba(56,189,248,0.2), rgba(56,189,248,0.04))', minHeight: 48, margin: '8px 0' }} />
                }
              </div>
              {/* Content */}
              <div style={{ paddingBottom: i < beats.length - 1 ? 48 : 0, paddingTop: 4 }}>
                <div style={{ fontFamily: 'Oxanium', fontSize: 11, fontWeight: 500, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(56,189,248,0.6)', marginBottom: 8 }}>{b.label}</div>
                {b.large ?
                <p style={{ fontFamily: 'Oxanium', fontWeight: 300, fontSize: 'clamp(22px,3vw,36px)', color: '#e2e8f0', lineHeight: 1.3 }}>{b.text}</p> :
                <p style={{ fontSize: 15, color: '#64748b', lineHeight: 1.85, fontWeight: 300 }}>{b.text}</p>
                }
              </div>
            </div>);

        })}
      </div>
    </section>);

};
