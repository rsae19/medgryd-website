/* ── STARS BG ───────────────────────────────────────────── */
const StarsBg = () => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    let stars = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2,
        speed: Math.random() * 2 + 0.5,
        offset: Math.random() * Math.PI * 2,
        accent: Math.random() < 0.14,
      }));
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(56,189,248,0.035)'; ctx.lineWidth = 0.5;
      for (let x = 0; x < canvas.width; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y = 0; y < canvas.height; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      stars.forEach(s => {
        const tw = 0.4 + 0.6 * Math.sin(t * s.speed + s.offset);
        if (s.accent) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(56,189,248,${tw * 0.85})`;
          ctx.shadowColor = 'rgba(56,189,248,0.6)'; ctx.shadowBlur = 5;
          ctx.fill(); ctx.shadowBlur = 0;
        } else {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.85, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,220,255,${tw * 0.5})`;
          ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />;
};

          <h2 style={{ fontFamily: 'Oxanium', fontWeight: 300, fontSize: 'clamp(26px,4vw,42px)', color: '#f1f5f9', marginBottom: 12, letterSpacing: '-0.01em' }}>Get in Touch</h2>

          <a href="mailto:hello@medgryd.com" style={{ display: 'inline-block', marginTop: 10, fontFamily: 'Oxanium', fontSize: 13, color: '#38bdf8', textDecoration: 'none', letterSpacing: '0.06em' }}>hello@medgryd.com</a>
        </div>

        {sent ?
        <div style={{ textAlign: 'center', padding: '48px 32px', borderRadius: 16, background: 'rgba(56,189,248,0.05)', border: '1px solid rgba(56,189,248,0.2)' }}>
            <div style={{ fontFamily: 'Oxanium', fontWeight: 400, fontSize: 20, color: '#f1f5f9', marginBottom: 8 }}>Message sent ✓</div>
            <p style={{ color: '#64748b', fontSize: 14 }}>Your email client should have opened. We'll get back to you soon.</p>
          </div> :

        <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Name</label>
                <input
                type="text" placeholder="Your name" required
                value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })}
                onFocus={() => setFocused('name')} onBlur={() => setFocused(null)}
                style={inputStyle('name')} />
              
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Email</label>
                <input
                type="email" placeholder="you@example.com" required
                value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })}
                onFocus={() => setFocused('email')} onBlur={() => setFocused(null)}
                style={inputStyle('email')} />
              
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Message</label>
              <textarea
              placeholder="Tell us what's on your mind..." required rows={5}
              value={form.message} onChange={(e) => setForm({ ...form, message: e.target.value })}
              onFocus={() => setFocused('message')} onBlur={() => setFocused(null)}
              style={{ ...inputStyle('message'), resize: 'vertical', minHeight: 120 }} />
            
            </div>
            <button type="submit" style={{
            fontFamily: 'Oxanium', fontWeight: 600, fontSize: 13,
            letterSpacing: '0.1em', textTransform: 'uppercase',
            background: '#38bdf8', color: '#0a0a0f',
            padding: '14px 32px', borderRadius: 10, border: 'none', cursor: 'pointer',
            boxShadow: '0 0 24px rgba(56,189,248,0.35)',
            transition: 'box-shadow 0.2s, transform 0.15s',
            alignSelf: 'flex-start'
          }}
          onMouseEnter={(e) => {e.currentTarget.style.boxShadow = '0 0 36px rgba(56,189,248,0.55)';e.currentTarget.style.transform = 'translateY(-1px)';}}
          onMouseLeave={(e) => {e.currentTarget.style.boxShadow = '0 0 24px rgba(56,189,248,0.35)';e.currentTarget.style.transform = '';}}>Send Message</button>
          </form>
        }
      </div>
    </section>);

};

      </div>
      <div style={{ display: 'flex', gap: 48, flexWrap: 'wrap' }}>
        <div>
          <div style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569', marginBottom: 12 }}>Platform</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {[['Features', 'features.html'], ['Pricing', 'pricing.html'], ['About', 'about.html']].map(([l, h]) =>

          <div style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569', marginBottom: 12 }}>Contact</div>
          <a href="mailto:hello@medgryd.com" style={{ fontSize: 13, color: '#64748b', textDecoration: 'none', display: 'block', marginBottom: 8 }}>hello@medgryd.com</a>
          <a href="https://app.medgryd.com" target="_blank" rel="noopener noreferrer" style={{ fontFamily: 'Oxanium', fontSize: 12, fontWeight: 600, color: '#38bdf8', textDecoration: 'none', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Launch App →</a>
        </div>
      </div>
    </div>
    <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
      <span style={{ fontSize: 12, color: '#334155' }}>© 2026 MedGryd. All rights reserved.</span>
      <span style={{ fontSize: 12, color: '#1e293b', fontFamily: 'Oxanium' }}>Built with 🩺 for future physicians</span>
    </div>
