const { useState, useEffect, useRef } = React;
const useWindowWidth = () => {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h, { passive: true });
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
};

/* ── PRIVACY POLICY PAGE ─────────────────────────────────── */
const PrivacyPage = () => {
  const accent = '#38bdf8';
  const S = {
    page: { minHeight: '100vh', paddingTop: 68, background: '#0a0a0f' },
    hero: {
      padding: 'clamp(60px,8vw,100px) clamp(20px,5vw,80px) 48px',
      background: 'linear-gradient(180deg, rgba(56,189,248,0.04) 0%, transparent 60%)',
      borderBottom: '1px solid rgba(255,255,255,0.05)',
      maxWidth: 1100, margin: '0 auto',
    },
    label: { fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: accent, marginBottom: 16 },
    title: { fontFamily: 'Oxanium', fontSize: 'clamp(32px,5vw,52px)', fontWeight: 700, color: '#f1f5f9', lineHeight: 1.1, marginBottom: 16 },
    meta:  { fontSize: 13, color: '#475569' },
    body:  { maxWidth: 760, margin: '0 auto', padding: 'clamp(40px,6vw,80px) clamp(20px,5vw,80px)' },
    h2:    { fontFamily: 'Oxanium', fontSize: 18, fontWeight: 600, color: '#e2e8f0', marginBottom: 10, marginTop: 40, paddingBottom: 8, borderBottom: '1px solid rgba(255,255,255,0.06)' },
    h3:    { fontSize: 14, fontWeight: 600, color: '#94a3b8', marginBottom: 6, marginTop: 20 },
    p:     { fontSize: 14, lineHeight: 1.75, color: '#64748b', marginBottom: 12 },
    ul:    { paddingLeft: 20, marginBottom: 12 },
    li:    { fontSize: 14, lineHeight: 1.75, color: '#64748b', marginBottom: 4 },
    a:     { color: accent, textDecoration: 'none', borderBottom: '1px solid rgba(56,189,248,0.3)' },
    card:  { background: 'rgba(56,189,248,0.04)', border: '1px solid rgba(56,189,248,0.12)', borderRadius: 10, padding: '16px 20px', marginBottom: 16 },
  };

  return (
    <div style={S.page}>
      <div style={S.hero}>
        <div style={S.label}>Legal</div>
        <h1 style={S.title}>Privacy Policy</h1>
        <p style={S.meta}>Effective Date: May 24, 2026 &nbsp;·&nbsp; Last Updated: May 24, 2026</p>
      </div>

      <div style={S.body}>

        <h2 style={S.h2}>1. Introduction</h2>
        <p style={S.p}>MedGryd ("we," "us," or "our") is a student productivity platform built for medical students. This Privacy Policy explains what information we collect when you use MedGryd, how we use it, who we share it with, and your rights over your data.</p>
        <p style={S.p}>By creating an account or using MedGryd, you agree to the practices described in this policy. If you are using MedGryd through your medical school's license, your school may have additional data agreements with us — refer to your school's privacy notices as well.</p>

        <h2 style={S.h2}>2. Who We Are</h2>
        <p style={S.p}>MedGryd is an independent software product developed by Raayed Saeed and Aaron Smith (co-developer, Quiz Mastery feature). We are the data controllers for all personal information processed through the app.</p>
        <div style={S.card}>
          <p style={{...S.p, marginBottom: 0}}>📧 <strong style={{color:'#94a3b8'}}>hello@medgryd.com</strong> — for privacy requests, use subject line "Privacy Request."</p>
        </div>

        <h2 style={S.h2}>3. Information We Collect</h2>

        <h3 style={S.h3}>3.1 Account Information (via Google Sign-In)</h3>
        <p style={S.p}>When you sign in with Google, we receive your Google account email address, display name, profile photo URL, and a unique Firebase user ID (UID). We do not receive your Google password, payment information, or any other Google account data.</p>

        <h3 style={S.h3}>3.2 Study &amp; Planner Data</h3>
        <p style={S.p}>We store the following in Firebase Firestore under your account:</p>
        <ul style={S.ul}>
          <li style={S.li}>Weekly planner tasks — titles, times, completion status, notes, links, and priority</li>
          <li style={S.li}>Calendar events — synced from Google Calendar for your weekly view</li>
          <li style={S.li}>Exams and goals — names, dates, and personal study goals you enter</li>
          <li style={S.li}>Study session time — cumulative hours tracked by date</li>
          <li style={S.li}>Anki flashcard counts — daily review counts only (no card content)</li>
          <li style={S.li}>Skills Vault — confidence ratings and notes for OMM techniques and CEPA clinical skills</li>
          <li style={S.li}>Score Matrix — assessment scores and grade projections you enter</li>
          <li style={S.li}>OSCE Tracker — notes and scores from OSCE practice sessions</li>
          <li style={S.li}>Quick Jot — rich text notes organized in sections</li>
          <li style={S.li}>App settings and preferences — theme, colors, calendar configurations, and other UI preferences</li>
        </ul>

        <h3 style={S.h3}>3.3 Quiz Mastery Data</h3>
        <p style={S.p}>If you use the Quiz Mastery feature: uploaded quiz sets (questions, answer choices, explanations), your answers, confidence ratings, attempt history, and per-topic mastery scores.</p>

        <h3 style={S.h3}>3.4 Research Hub Data</h3>
        <p style={S.p}>Personal research projects (title, status, co-authors, journal, links, task lists, deadlines). Shared projects are stored in a shared collection accessible only to members you invite via invite code.</p>

        <h3 style={S.h3}>3.5 GrydRank / Leaderboard Data</h3>
        <p style={S.p}>XP, level, badges, and aggregate study/task/Anki totals. <strong style={{color:'#94a3b8'}}>Leaderboard participation is opt-in.</strong> If you opt in, your display name, profile photo, and stats are visible to cohort members. You may enable anonymous mode to display as "Anonymous." Study group members can see your stats within the group.</p>

        <h3 style={S.h3}>3.6 Peer Board</h3>
        <p style={S.p}>Posts and replies are stored without your name — only your Firebase UID is stored internally for moderation. It is never displayed to other users.</p>

        <h3 style={S.h3}>3.7 Presence Information</h3>
        <p style={S.p}>When active, your online/offline status, display name, and last-seen timestamp are written to Firebase Realtime Database for group features.</p>

        <h3 style={S.h3}>3.8 Activation Data</h3>
        <p style={S.p}>Your activation code, display name, and Firebase UID are sent to our activation validation service to verify your code. This data is not retained after validation.</p>

        <h3 style={S.h3}>3.9 Quiz Password Cache (Noorda Students)</h3>
        <p style={S.p}>Daily Examplify and CEPA weekly quiz passwords are fetched and cached in a shared Firestore document visible to all Noorda DO29 students as operational data for coursework.</p>

        <h2 style={S.h2}>4. How We Use Your Information</h2>
        <ul style={S.ul}>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Provide the service</strong> — display your planner, sync calendar events, track study progress</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Personalize your experience</strong> — apply your settings, theme, and preferences</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Power social/collaborative features</strong> — leaderboard, peer board, study groups, shared research</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Improve the app</strong> — diagnose errors and bugs using error reports</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Enforce our terms</strong> — detect abuse of the peer board or activation system</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>License to medical schools</strong> — aggregate non-identifiable usage patterns may be shared with licensed institutions</li>
        </ul>
        <p style={S.p}>We do <strong style={{color:'#94a3b8'}}>not</strong> use your data for advertising, sell your data to third parties, or use it for purposes unrelated to providing MedGryd.</p>

        <h2 style={S.h2}>5. Third-Party Services</h2>

        <h3 style={S.h3}>5.1 Google / Firebase</h3>
        <p style={S.p}>Firebase Authentication, Firestore, Realtime Database, and Storage are used as our backend. Data is stored in the United States. <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer" style={S.a}>Google Privacy Policy →</a></p>

        <h3 style={S.h3}>5.2 Google Calendar API</h3>
        <p style={S.p}>We access your Google Calendar (read-only) to sync events into your planner. Calendar data is not shared with any party other than Google and Firebase.</p>

        <h3 style={S.h3}>5.3 Sentry (Error Monitoring &amp; Session Replay)</h3>
        <p style={S.p}>We use Sentry for error tracking. Sentry may collect JavaScript errors, network request metadata, and browser information. <strong style={{color:'#94a3b8'}}>Approximately 10% of sessions are recorded as interactive replays; 100% of sessions in which an error occurs are recorded.</strong> Our current configuration does not mask on-screen text, so content you enter (task names, notes) may appear in error reports visible to our development team. We are evaluating stricter masking before broader institutional deployment. <a href="https://sentry.io/privacy/" target="_blank" rel="noopener noreferrer" style={S.a}>Sentry Privacy Policy →</a></p>

        <h3 style={S.h3}>5.4 Tawk.to (Support Chat)</h3>
        <p style={S.p}>If you use the in-app support chat, your conversation and session metadata are processed by Tawk.to. <a href="https://www.tawk.to/privacy-policy/" target="_blank" rel="noopener noreferrer" style={S.a}>Tawk.to Privacy Policy →</a></p>

        <h3 style={S.h3}>5.5 Vercel (Hosting)</h3>
        <p style={S.p}>MedGryd is hosted on Vercel, which may log standard request metadata (IP address, user agent, timestamps). <a href="https://vercel.com/legal/privacy-policy" target="_blank" rel="noopener noreferrer" style={S.a}>Vercel Privacy Policy →</a></p>

        <h3 style={S.h3}>5.6 AnkiConnect (Local, Optional)</h3>
        <p style={S.p}>Anki integration communicates only with AnkiConnect running on your own computer (localhost). No Anki data is sent to external servers — only daily review counts are stored in MedGryd.</p>

        <h2 style={S.h2}>6. Educational Records &amp; FERPA</h2>
        <p style={S.p}>If you use MedGryd through a medical school with a data agreement, certain data (grades, study time, self-assessed competency) may constitute educational records under FERPA. In such cases, we act as a school official with a legitimate educational interest and do not disclose records without consent except as permitted by FERPA.</p>
        <p style={S.p}><strong style={{color:'#94a3b8'}}>Currently (beta period):</strong> MedGryd is used independently — no educational record sharing occurs.</p>

        <h2 style={S.h2}>7. Data Security</h2>
        <ul style={S.ul}>
          <li style={S.li}>All data transmitted over HTTPS (TLS encryption in transit)</li>
          <li style={S.li}>Firebase Firestore uses Google's infrastructure (data encrypted at rest)</li>
          <li style={S.li}>Access to your data is restricted to your Firebase UID via Firestore Security Rules</li>
          <li style={S.li}>Only the development team has access to Sentry error reports and session replays</li>
        </ul>
        <p style={S.p}>No internet service is 100% secure. We recommend a strong Google account password and two-factor authentication.</p>

        <h2 style={S.h2}>8. Your Rights &amp; Choices</h2>
        <ul style={S.ul}>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Access:</strong> View your data in the app; request a machine-readable export by email.</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Correction:</strong> Edit or delete tasks, notes, goals, etc. at any time through the app.</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Deletion:</strong> Email hello@medgryd.com with subject "Account Deletion Request." We will delete your Firestore documents within 30 days. Peer Board posts will be anonymized.</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Opt-out of Leaderboard:</strong> Disable participation or enable anonymous mode in Settings → GrydRank.</li>
          <li style={S.li}><strong style={{color:'#94a3b8'}}>Opt-out of Sentry replay:</strong> No per-user opt-out currently available. Contact us if this is a concern.</li>
        </ul>

        <h2 style={S.h2}>9. Data Retention</h2>
        <ul style={S.ul}>
          <li style={S.li}>Personal data is retained while your account is active. Inactive accounts may be purged after 24 months.</li>
          <li style={S.li}>Leaderboard entries are removed when you delete your account.</li>
          <li style={S.li}>Peer Board posts are soft-deleted (body cleared) on request; the post shell may remain.</li>
          <li style={S.li}>Sentry error reports are retained per Sentry's standard retention period (90 days for session replays).</li>
          <li style={S.li}>Activation validation data is not retained by MedGryd after validation.</li>
        </ul>

        <h2 style={S.h2}>10. Children's Privacy</h2>
        <p style={S.p}>MedGryd is designed exclusively for medical students (adults aged 18+). We do not knowingly collect personal information from anyone under 18. Contact us if you believe a minor has created an account.</p>

        <h2 style={S.h2}>11. Changes to This Policy</h2>
        <p style={S.p}>We may update this policy as the app evolves. Material changes will be announced in the app. Continued use after the notice constitutes acceptance.</p>
