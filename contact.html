const { useState, useEffect, useRef } = React;
const useWindowWidth = () => {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h, { passive: true });
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
};


/* ── STARS BG ───────────────────────────────────────────── */
const StarsBg = () => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    let stars = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2,
        speed: Math.random() * 2 + 0.5,
        offset: Math.random() * Math.PI * 2,
        accent: Math.random() < 0.14,
      }));
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(56,189,248,0.035)'; ctx.lineWidth = 0.5;
      for (let x = 0; x < canvas.width; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y = 0; y < canvas.height; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      stars.forEach(s => {
        const tw = 0.4 + 0.6 * Math.sin(t * s.speed + s.offset);
        if (s.accent) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(56,189,248,${tw * 0.85})`;
          ctx.shadowColor = 'rgba(56,189,248,0.6)'; ctx.shadowBlur = 5;
          ctx.fill(); ctx.shadowBlur = 0;
        } else {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.85, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,220,255,${tw * 0.5})`;
          ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />;
};

/* ── CONTACT FORM ───────────────────────────────────────── */
const ContactForm = () => {
  const isMobile = useWindowWidth() < 640;
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  const [focused, setFocused] = useState(null);

  const inputStyle = (id) => ({
    width: '100%', background: '#0f0f18',
    border: `1px solid ${focused === id ? 'rgba(56,189,248,0.45)' : 'rgba(255,255,255,0.08)'}`,
    borderRadius: 10, padding: '13px 16px',
    color: '#e2e8f0', fontSize: 14, fontFamily: 'Space Grotesk',
    outline: 'none', transition: 'border-color 0.2s',
    boxShadow: focused === id ? '0 0 0 3px rgba(56,189,248,0.06)' : 'none'
  });

  const handleSubmit = async (e) => {
    e.preventDefault();
    setStatus('sending');
    try {
      const res = await fetch('https://formspree.io/f/maqvrpwp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name: form.name, email: form.email, message: form.message }),
      });
      if (res.ok) {
        setStatus('sent');
      } else {
        setStatus('error');
      }
    } catch {
      setStatus('error');
    }
  };

  return (
    <section style={{ background: '#0a0a0f', padding: 'clamp(32px,5vw,64px) clamp(20px,5vw,80px) clamp(64px,8vw,96px)' }}>
      <div style={{ maxWidth: 640, margin: '0 auto' }}>

        {/* Direct email line */}
        <div style={{ textAlign: 'center', marginBottom: 48 }}>
          <a href="mailto:hello@medgryd.com" style={{ display: 'inline-block', fontFamily: 'Oxanium', fontSize: 13, color: '#38bdf8', textDecoration: 'none', letterSpacing: '0.06em' }}>hello@medgryd.com</a>
        </div>

        {status === 'sent' ?
          <div style={{ textAlign: 'center', padding: '56px 32px', borderRadius: 16, background: 'rgba(56,189,248,0.05)', border: '1px solid rgba(56,189,248,0.2)', animation: 'fade-up 0.4s ease both' }}>
            <div style={{ fontSize: 32, marginBottom: 14 }}>✓</div>
            <div style={{ fontFamily: 'Oxanium', fontWeight: 400, fontSize: 20, color: '#f1f5f9', marginBottom: 8 }}>Message sent!</div>
            <p style={{ color: '#64748b', fontSize: 14 }}>Thanks for reaching out — we'll get back to you soon.</p>
          </div>
        :
          <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 16 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Name</label>
                <input
                  type="text" placeholder="Your name" required
                  value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })}
                  onFocus={() => setFocused('name')} onBlur={() => setFocused(null)}
                  style={inputStyle('name')} />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Email</label>
                <input
                  type="email" placeholder="you@example.com" required
                  value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })}
                  onFocus={() => setFocused('email')} onBlur={() => setFocused(null)}
                  style={inputStyle('email')} />
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <label style={{ fontFamily: 'Oxanium', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#475569' }}>Message</label>
              <textarea
                placeholder="Tell us what's on your mind..." required rows={6}
                value={form.message} onChange={(e) => setForm({ ...form, message: e.target.value })}
                onFocus={() => setFocused('message')} onBlur={() => setFocused(null)}
                style={{ ...inputStyle('message'), resize: 'vertical', minHeight: 140 }} />
            </div>
            {status === 'error' &&
              <p style={{ fontSize: 13, color: '#f87171', fontFamily: 'Oxanium' }}>Something went wrong — please try again or email us directly.</p>
            }
            <button type="submit" disabled={status === 'sending'} style={{
              fontFamily: 'Oxanium', fontWeight: 600, fontSize: 13,
              letterSpacing: '0.1em', textTransform: 'uppercase',
              background: status === 'sending' ? 'rgba(56,189,248,0.5)' : '#38bdf8',
              color: '#0a0a0f', padding: '14px 32px', borderRadius: 10,
              border: 'none', cursor: status === 'sending' ? 'default' : 'pointer',
              boxShadow: '0 0 24px rgba(56,189,248,0.35)',
              transition: 'box-shadow 0.2s, transform 0.15s, background 0.2s',
              alignSelf: 'flex-start'
            }}
            onMouseEnter={(e) => { if (status !== 'sending') { e.currentTarget.style.boxShadow = '0 0 36px rgba(56,189,248,0.55)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}}
            onMouseLeave={(e) => { e.currentTarget.style.boxShadow = '0 0 24px rgba(56,189,248,0.35)'; e.currentTarget.style.transform = ''; }}>
              {status === 'sending' ? 'Sending…' : 'Send Message'}
            </button>
          </form>
        }
      </div>
    </section>);
};
