/* ── STARS BG ───────────────────────────────────────────── */
const StarsBg = () => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    let stars = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2,
        speed: Math.random() * 2 + 0.5,
        offset: Math.random() * Math.PI * 2,
        accent: Math.random() < 0.14,
      }));
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // faint grid
      ctx.strokeStyle = 'rgba(56,189,248,0.035)'; ctx.lineWidth = 0.5;
      for (let x = 0; x < canvas.width; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y = 0; y < canvas.height; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      stars.forEach(s => {
        const tw = 0.4 + 0.6 * Math.sin(t * s.speed + s.offset);
        if (s.accent) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(56,189,248,${tw * 0.85})`;
          ctx.shadowColor = 'rgba(56,189,248,0.6)'; ctx.shadowBlur = 5;
          ctx.fill(); ctx.shadowBlur = 0;
        } else {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.85, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,220,255,${tw * 0.5})`;
          ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />;
};

          <span style={{ fontFamily:'Oxanium', fontSize:11, fontWeight:500, letterSpacing:'0.16em', textTransform:'uppercase', color:'#38bdf8', display:'block', marginBottom:16 }}>Pricing</span>
          <h1 style={{ fontFamily:'Oxanium', fontWeight:200, fontSize:'clamp(30px,5vw,58px)', color:'#f1f5f9', lineHeight:1.1, marginBottom:14, letterSpacing:'-0.01em' }}>
            Simple, Transparent Pricing

          <p style={{ fontSize:'clamp(15px,2vw,18px)', color:'#94a3b8', fontWeight:300, maxWidth:480, margin:'0 auto' }}>

      {/* Cards */}

};
