const { useState, useEffect, useRef, useCallback } = React;
const useWindowWidth = () => {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h, { passive: true });
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
};

    flask: "M9 2v7L4.5 17A2 2 0 0 0 6.4 20h11.2a2 2 0 0 0 1.9-3L15 9V2M9 2h6M8 12h8",

    layers: "M2 7l10-5 10 5-10 5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",

    book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z",

/* ─── CANVAS HERO BG ─────────────────────────────────────── */
const HeroBg = ({ accent }) => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    let t = 0;

    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    };
    const { r, g, b } = hexToRgb(accent);

    // ── Rocket ships ───────────────────────────────────────
    const rockets = [];
    let lastRocket = -8;

    const spawnRocket = () => {
      const fromLeft = Math.random() < 0.5;
      const angleDeg = (Math.random() - 0.5) * 44;
      const angleRad = (angleDeg * Math.PI) / 180;
      const speed = Math.random() * 2.0 + 1.2;
      const edgeY = Math.random() * H * 0.82 + H * 0.05;
      const dir = fromLeft ? 1 : -1;
      rockets.push({
        x: fromLeft ? -80 : W + 80,
        y: edgeY,
        vx: dir * speed * Math.cos(Math.abs(angleRad)),
        vy: speed * Math.sin(angleRad) * (Math.random() < 0.5 ? 1 : -1),
        angle: fromLeft ? angleRad * (Math.random() < 0.5 ? 1 : -1) : Math.PI + angleRad * (Math.random() < 0.5 ? 1 : -1),
        scale: Math.random() * 0.5 + 0.3,
        alpha: 0,
        bodyLen: Math.random() * 12 + 16,
        bodyW:   Math.random() * 4  + 6,
        noseLen: Math.random() * 10 + 12,
        finSz:   Math.random() * 4  + 5,
        windowR: Math.random() * 1.5 + 2.5,
        hasStripe: Math.random() < 0.45,
      });
    };

    const drawRocketShape = (ctx, rk) => {
      const { bodyLen: bL, bodyW: bW, noseLen: nL, finSz: fS, hasStripe, windowR: wR } = rk;
      const ac = (a) => `rgba(${r},${g},${b},${a})`;

      // Body
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(-bL, -bW, bL * 2, bW * 2, bW * 0.35);
      else { ctx.rect(-bL, -bW, bL * 2, bW * 2); }
      ctx.fillStyle = ac(0.10); ctx.fill();
      ctx.strokeStyle = ac(0.55); ctx.lineWidth = 0.8; ctx.stroke();

      // Nose cone — sharp pointed
      ctx.beginPath();
      ctx.moveTo(bL, -bW * 0.65);
      ctx.lineTo(bL + nL, 0);
      ctx.lineTo(bL, bW * 0.65);
      ctx.closePath();
      ctx.fillStyle = ac(0.40); ctx.fill();
      ctx.strokeStyle = ac(0.65); ctx.lineWidth = 0.7; ctx.stroke();

      // Delta fins
      [[1], [-1]].forEach(([s]) => {
        ctx.beginPath();
        ctx.moveTo(-bL * 0.55, s * bW);
        ctx.lineTo(-bL * 0.55 - fS * 0.4, s * (bW + fS));
        ctx.lineTo(-bL * 0.15, s * bW);
        ctx.closePath();
        ctx.fillStyle = ac(0.32); ctx.fill();
        ctx.strokeStyle = ac(0.50); ctx.lineWidth = 0.6; ctx.stroke();
      });

      // Stripe
      if (hasStripe) {
        ctx.beginPath();
        ctx.moveTo(bL * 0.15, -bW); ctx.lineTo(bL * 0.15, bW);
        ctx.strokeStyle = ac(0.28); ctx.lineWidth = 1.4; ctx.stroke();
      }

      // Window
      ctx.beginPath(); ctx.arc(bL * 0.28, 0, wR, 0, Math.PI * 2);
      ctx.fillStyle = ac(0.16); ctx.fill();
      ctx.strokeStyle = ac(0.50); ctx.lineWidth = 0.6; ctx.stroke();
      // inner glint
      ctx.beginPath(); ctx.arc(bL * 0.28 - wR * 0.3, -wR * 0.3, wR * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = ac(0.30); ctx.fill();

      // Exhaust flame
      const flicker = 0.75 + 0.25 * Math.sin(t * 20 + rk.y * 0.05);
      const exLen = bL * 0.85 * flicker + 8;
      const exGrad = ctx.createLinearGradient(-bL, 0, -bL - exLen, 0);
      exGrad.addColorStop(0,   ac(0.60));
      exGrad.addColorStop(0.4, ac(0.28));
      exGrad.addColorStop(1,   ac(0));
      ctx.beginPath();
      ctx.moveTo(-bL, -bW * 0.42);
      ctx.quadraticCurveTo(-bL - exLen * 0.55, 0, -bL - exLen, 0);
      ctx.quadraticCurveTo(-bL - exLen * 0.55, 0, -bL,  bW * 0.42);
      ctx.fillStyle = exGrad; ctx.fill();

      // Bright core
      const cGrad = ctx.createLinearGradient(-bL, 0, -bL - exLen * 0.4, 0);
      cGrad.addColorStop(0, ac(0.85)); cGrad.addColorStop(1, ac(0));
      ctx.beginPath();
      ctx.moveTo(-bL, -bW * 0.16);
      ctx.quadraticCurveTo(-bL - exLen * 0.32, 0, -bL - exLen * 0.4, 0);
      ctx.quadraticCurveTo(-bL - exLen * 0.32, 0, -bL,  bW * 0.16);
      ctx.fillStyle = cGrad; ctx.fill();
    };

    const drawRockets = () => {
      if (t - lastRocket > (Math.random() * 7 + 5)) {
        spawnRocket();
        lastRocket = t;
      }
      for (let i = rockets.length - 1; i >= 0; i--) {
        const rk = rockets[i];
        rk.x += rk.vx;
        rk.y += rk.vy;
        if (rk.alpha < 1) rk.alpha = Math.min(1, rk.alpha + 0.025);
        const prog = rk.vx > 0 ? rk.x / W : (W - rk.x) / W;
        if (prog > 0.82) rk.alpha = Math.max(0, 1 - (prog - 0.82) / 0.18);
        if (rk.x > W + 130 || rk.x < -130 || rk.y > H + 100 || rk.y < -100) { rockets.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(rk.x, rk.y);
        ctx.rotate(rk.angle);
        ctx.scale(rk.scale, rk.scale);
        ctx.globalAlpha = rk.alpha;
        ctx.shadowColor = `rgba(${r},${g},${b},0.55)`;
        ctx.shadowBlur = 5;
        drawRocketShape(ctx, rk);
        ctx.restore();
      }
    };

    // ── Shooting stars ─────────────────────────────────────
    const shootingStars = [];
    const spawnShootingStar = () => {
      shootingStars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.5,
        len: Math.random() * 120 + 60,
        speed: Math.random() * 6 + 5,
        angle: Math.PI / 6 + Math.random() * Math.PI / 3,  // 30–90° varied trajectories
        alpha: 1,
        tail: []
      });
    };
    let lastShoot = 0;

    const drawShootingStars = () => {
      // One shooting star every 5–7 seconds
      if (t - lastShoot > (Math.random() * 2 + 5)) {
        spawnShootingStar();
        lastShoot = t;
      }
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        s.x += Math.cos(s.angle) * s.speed;
        s.y += Math.sin(s.angle) * s.speed;
        s.alpha -= 0.018;
        if (s.alpha <= 0 || s.x > W + 50 || s.y > H + 50) {
          shootingStars.splice(i, 1);
          continue;
        }
        const tailX = s.x - Math.cos(s.angle) * s.len;
        const tailY = s.y - Math.sin(s.angle) * s.len;
        const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
        grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
        grad.addColorStop(0.7, `rgba(${r},${g},${b},${s.alpha * 0.4})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},${s.alpha})`);
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = `rgba(${r},${g},${b},${s.alpha * 0.8})`;
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;
        // bright head dot
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${s.alpha})`;
        ctx.fill();
      }
    };

    // ── Stars ──────────────────────────────────────────────
    const makeStars = (W, H) => Array.from({ length: 220 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      radius: Math.random() * 1.2 + 0.2,
      twinkleSpeed: Math.random() * 2 + 0.5,
      twinkleOffset: Math.random() * Math.PI * 2,
      // small fraction are blue-tinted accent stars
      accent: Math.random() < 0.12
    }));

    // ── Drifting dust particles ────────────────────────────
    const makeParticles = (W, H) => Array.from({ length: 38 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.06,
      size: Math.random() * 1.8 + 0.4,
      alpha: Math.random() * 0.4 + 0.1
    }));

    let W = 0,H = 0,stars = [],particles = [];

    const resize = () => {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      stars = makeStars(W, H);
      particles = makeParticles(W, H);
    };
    resize();
    window.addEventListener('resize', resize);

    // ── Sparse grid ────────────────────────────────────────
    const drawGrid = () => {
      const gs = 64;
      ctx.strokeStyle = `rgba(${r},${g},${b},0.04)`;
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += gs) {
        ctx.beginPath();ctx.moveTo(x, 0);ctx.lineTo(x, H);ctx.stroke();
      }
      for (let y = 0; y < H; y += gs) {
        ctx.beginPath();ctx.moveTo(0, y);ctx.lineTo(W, y);ctx.stroke();
      }
    };

    // ── Star field ─────────────────────────────────────────
    const drawStars = () => {
      stars.forEach((s) => {
        const twinkle = 0.45 + 0.55 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset);
        const alpha = twinkle * (s.accent ? 0.85 : 0.55);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        if (s.accent) {
          ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
          // tiny glow for accent stars
          ctx.shadowColor = `rgba(${r},${g},${b},${alpha * 0.6})`;
          ctx.shadowBlur = 4;
        } else {
          ctx.fillStyle = `rgba(200,220,255,${alpha})`;
          ctx.shadowBlur = 0;
        }
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    };

    // ── Dust / nebula particles ────────────────────────────
    const drawParticles = () => {
      particles.forEach((p) => {
        p.x += p.vx;p.y += p.vy;
        if (p.x < 0) p.x = W;if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha * 0.6})`;
        ctx.fill();
      });
    };

    // ── Nebula glow blobs ──────────────────────────────────
    const drawNebula = () => {
      // Two soft nebula clouds — upper-left & lower-right
      const blobs = [
      { cx: W * 0.18, cy: H * 0.28, rx: W * 0.28, ry: H * 0.22, alpha: 0.055 },
      { cx: W * 0.82, cy: H * 0.72, rx: W * 0.24, ry: H * 0.20, alpha: 0.04 }];

      blobs.forEach((blob) => {
        const grad = ctx.createRadialGradient(blob.cx, blob.cy, 0, blob.cx, blob.cy, Math.max(blob.rx, blob.ry));
        grad.addColorStop(0, `rgba(${r},${g},${b},${blob.alpha})`);
        grad.addColorStop(0.5, `rgba(${r},${g},${b},${blob.alpha * 0.4})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.save();
        ctx.scale(blob.rx / Math.max(blob.rx, blob.ry), blob.ry / Math.max(blob.rx, blob.ry));
        ctx.beginPath();
        ctx.arc(
          blob.cx * (Math.max(blob.rx, blob.ry) / blob.rx),
          blob.cy * (Math.max(blob.rx, blob.ry) / blob.ry),
          Math.max(blob.rx, blob.ry), 0, Math.PI * 2
        );
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      });
    };

    // ── Orbit ring (references logo motif) ────────────────
    const drawOrbit = () => {
      const cx = W * 0.5,cy = H * 0.5;
      const rx = W * 0.38,ry = H * 0.10;
      const spin = t * 0.06;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(spin);
      ctx.scale(1, ry / rx);
      ctx.beginPath();
      ctx.arc(0, 0, rx, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.07)`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // small dot travelling the orbit
      const dotAngle = t * 0.5;
      const dx = rx * Math.cos(dotAngle);
      const dy = rx * Math.sin(dotAngle);
      ctx.beginPath();
      ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},0.55)`;
      ctx.shadowColor = `rgba(${r},${g},${b},0.8)`;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    };

    // ── Pulse rings ────────────────────────────────────────
    const pulses = [{ phase: 0 }, { phase: 0.4 }, { phase: 0.75 }];
    const drawPulses = () => {
      pulses.forEach((p) => {
        const prog = (t * 0.3 + p.phase) % 1;
        const maxR = Math.max(W, H) * 0.65;
        const radius = prog * maxR;
        const alpha = (1 - prog) * 0.09;
        ctx.beginPath();
        ctx.arc(W * 0.5, H * 0.5, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    };

    // ── EKG waveform function ──────────────────────────────
    // Returns y-offset for a given phase [0..1] within one heartbeat cycle
    const ekgY = (phase) => {
      // P wave: small bump ~0.10–0.18
      if (phase > 0.10 && phase < 0.18) {
        const p = (phase - 0.10) / 0.08;
        return -10 * Math.sin(p * Math.PI);
      }
      // PR segment: flat 0.18–0.26
      if (phase >= 0.18 && phase < 0.26) return 0;
      // Q dip: 0.26–0.30
      if (phase >= 0.26 && phase < 0.30) {
        const p = (phase - 0.26) / 0.04;
        return 14 * Math.sin(p * Math.PI);
      }
      // R spike up: 0.30–0.36
      if (phase >= 0.30 && phase < 0.36) {
        const p = (phase - 0.30) / 0.06;
        return -78 * Math.sin(p * Math.PI);
      }
      // S dip: 0.36–0.42
      if (phase >= 0.36 && phase < 0.42) {
        const p = (phase - 0.36) / 0.06;
        return 28 * Math.sin(p * Math.PI);
      }
      // ST segment: flat 0.42–0.52
      if (phase >= 0.42 && phase < 0.52) return 0;
      // T wave: broad bump 0.52–0.72
      if (phase >= 0.52 && phase < 0.72) {
        const p = (phase - 0.52) / 0.20;
        return -22 * Math.sin(p * Math.PI);
      }
      // baseline
      return 0;
    };

    // ── EKG write-head state ───────────────────────────────
    // writeX: current pixel column of the moving head
    // yBuffer: stores y-offset for each pixel column
    let writeX = 0;
    let yBuffer = [];
    const EKG_CYCLE_PX = () => W * 0.32; // one heartbeat = 32% of screen width
    const EKG_CY = () => H * 0.87;
    const EKG_SPEED = 1.4; // pixels per frame

    const drawEkg = () => {
      const cy = EKG_CY();
      const cyc = EKG_CYCLE_PX();

      // Advance write head
      writeX += EKG_SPEED;
      if (writeX >= W) {writeX = 0;yBuffer = [];}

      // Fill yBuffer up to writeX
      while (yBuffer.length <= Math.floor(writeX)) {
        const px = yBuffer.length;
        const phase = px / cyc % 1;
        yBuffer.push(ekgY(phase));
      }

      // ── Draw the trace ──────────────────────────────────
      // Split into segments with alpha fade based on distance behind head
      const TAIL = Math.min(W * 0.85, yBuffer.length - 1);
      const fadeStart = writeX - TAIL;

      if (yBuffer.length < 2) return;

      // Build gradient along the line
      const grad = ctx.createLinearGradient(Math.max(0, fadeStart), 0, writeX, 0);
      grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
      grad.addColorStop(0.25, `rgba(${r},${g},${b},0.15)`);
      grad.addColorStop(0.75, `rgba(${r},${g},${b},0.55)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0.85)`);

      ctx.beginPath();
      const startPx = Math.max(0, Math.floor(fadeStart));
      ctx.moveTo(startPx, cy + (yBuffer[startPx] || 0));
      for (let px = startPx + 1; px <= Math.floor(writeX) && px < yBuffer.length; px++) {
        ctx.lineTo(px, cy + yBuffer[px]);
      }
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.6;
      ctx.shadowColor = `rgba(${r},${g},${b},0.7)`;
      ctx.shadowBlur = 7;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // ── Glowing cursor dot at write head ──────────────
      const headY = cy + (yBuffer[Math.floor(writeX)] || 0);
      ctx.beginPath();
      ctx.arc(writeX, headY, 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},0.95)`;
      ctx.shadowColor = `rgba(${r},${g},${b},1)`;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;

      // ── Black wipe ahead of cursor (monitor sweep look) ─
      if (writeX < W - 1) {
        ctx.fillStyle = 'rgba(10,10,15,0.92)';
        ctx.fillRect(writeX + 1, cy - 110, Math.min(60, W - writeX - 1), 220);
      }
    };

    const draw = () => {
      t += 0.007;
      ctx.clearRect(0, 0, W, H);

      drawNebula();
      drawGrid();
      drawStars();
      drawShootingStars();
      drawRockets();
      drawParticles();
      drawOrbit();
      drawPulses();
      drawEkg();

      animId = requestAnimationFrame(draw);
    };

    draw();
    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
    };
  }, [accent]);

  return (
    <canvas
      ref={canvasRef}
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity: 0.95 }} />);


};

/* ─── ROOT APP ───────────────────────────────────────────── */
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');

  const { accentColor: accent, heroHeadline, heroSub, showSocialProof, cardStyle, darkFooter } = tweaks;

  const handleSetPage = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const renderPage = () => {
    switch (page) {
      case 'features':return <FeaturesPage accent={accent} cardStyle={cardStyle} />;
      case 'pricing':return <PricingPage accent={accent} />;
      case 'about':return <AboutPage accent={accent} />;
      default:return (
          <HomePage
            accent={accent}
            headline={heroHeadline}
            sub={heroSub}
            showSocialProof={showSocialProof}
            cardStyle={cardStyle}
            setPage={handleSetPage} />);


    }
  };

  return (
    <div>
          <Navbar page={page} setPage={handleSetPage} accent={accent} />
          {renderPage()}
          <Footer setPage={handleSetPage} accent={accent} dark={darkFooter} />

          <TweaksPanel>
            <TweakSection label="Brand">
              <TweakColor id="accentColor" label="Accent Color" value={accent} onChange={(v) => setTweak('accentColor', v)} />
            </TweakSection>
            <TweakSection label="Hero">
              <TweakText id="heroHeadline" label="Headline" value={heroHeadline} onChange={(v) => setTweak('heroHeadline', v)} />
              <TweakText id="heroSub" label="Subheadline" value={heroSub} onChange={(v) => setTweak('heroSub', v)} />
              <TweakToggle id="showSocialProof" label="Social Proof Bar" value={showSocialProof} onChange={(v) => setTweak('showSocialProof', v)} />
            </TweakSection>
            <TweakSection label="Cards">
              <TweakRadio id="cardStyle" label="Hover Effect" value={cardStyle} options={['glow', 'flat']} onChange={(v) => setTweak('cardStyle', v)} />
            </TweakSection>
            <TweakSection label="Footer">
              <TweakToggle id="darkFooter" label="Extra Dark Footer" value={darkFooter} onChange={(v) => setTweak('darkFooter', v)} />
            </TweakSection>
          </TweaksPanel>
        </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
